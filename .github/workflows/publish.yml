name: Publish to PyPI

# Publishes the package to PyPI whenever a GitHub Release is published,
# using PyPI Trusted Publishing (OIDC) — no API tokens stored anywhere.
on:
  release:
    types: [published]
  workflow_dispatch:  # allow manual publishing (e.g. the first release, or a re-run)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/bulk-post
    permissions:
      contents: read   # actions/checkout needs this; declaring permissions resets unlisted scopes to none
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build sdist and wheel
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
