workflow:
  description: Execute A, B and delete from C
  # group of logically colocated  api endpoints sharing same credentials.
  groupA:
    auth:
      type: bearer
      # optional, can be prompted later
      token: some_token
    endpoints:
      #  user chosen (dashed) name for an api endpoint
      - call-example-api:
          url: https://example.com/api/{{placeholderA}}
          #auth here overrides the parent group auth
          auth:
            type: bearer
            # optional, can be prompted later
            token: some_token
          method: POST
          on_error: stop
          # optional headers
          headers:
            XX-Api-Version: v1
            Content-Type: application/json
          # optional body
          body: '{ "param": "{{placeholderB}}"}'
  groupB:
    auth:
      type: basic
      user: user
      password: password
    endpoints:
      - call-another-example-api:
          url: https://another-example.com/another-api/{{placeholderA}}
          auth:
            type: basic
            user: user
            password: password
          method: PUT
          on_error: stop
          headers:
            XX-Api-Version: v3
            Content-Type: application/json
          body: '{ "somethingElse": "{{placeholderB}}"}'

  #example of a no-auth endpoint group using response-chaining variables
  groupC:
    # A group-level variable is inherited by all endpoints in the group.
    # Variable names must start with $ and are referenced as {{$name}} in url, headers, or body.
    variables:
      $someVariableName:
        # source identifies the earlier endpoint whose JSON response to read.
        # Written as .workflow.<group>.<endpoint>; the leading dot and "workflow." prefix are optional.
        source: .workflow.groupB.call-another-example-api
        # jsonPath is a full JSONPath expression; the first match is used.
        jsonPath: $.property
        # nullable defaults to true; null/no-match resolves to an empty string.
        nullable: true
    endpoints:
      - call-another-example-api:
          url: https://yet-another-example.com/yet-another-api/{{$id}}
          method: DELETE
          on_error: stop

          # An endpoint-level variable overrides any group variable with the same name.
          # It can reference any earlier endpoint's response (not just within the same group).
          variables:
            $id:
              source: .workflow.groupB.call-another-example-api
              jsonPath: $.id
              # nullable: false means the step fails if the value is null or the path has no match.
              nullable: false
